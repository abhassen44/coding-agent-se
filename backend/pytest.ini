[pytest]
testpaths = test_cases
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary with pass/fail/skip/error
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

markers =
    asyncio: async tests (handled by pytest-asyncio)
